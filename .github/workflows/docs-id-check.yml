name: docs-id-check

on:
  pull_request:
    paths:
      - 'docs/modules/ROOT/pages/**'
      - 'docs/scripts/check-heading-ids.py'
      - '.github/workflows/docs-id-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate heading IDs
        run: python docs/scripts/check-heading-ids.py --check
