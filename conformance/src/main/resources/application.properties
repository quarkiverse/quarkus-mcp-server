quarkus.application.name=mcp-conformance-test-server
quarkus.application.version=1.0.0

# HTTP configuration
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost,http://127.0.0.1,http://[::1],http://::1
quarkus.http.cors.exposed-headers=Mcp-Session-Id

# Traffic logging (disabled by default, enable for debugging)
#quarkus.mcp.server.traffic-logging.enabled=true
#quarkus.mcp.server.traffic-logging.text-limit=2000
